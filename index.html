<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character Set -->
    <meta charset="UTF-8" />

    <!-- Viewport for responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page Title -->
    <title>Gabriel Aldea - Web Developer Portfolio</title>

    <!-- Favicon -->
    <link
      rel="icon"
      href="https://gabrielaldea.netlify.app/favicon.ico"
      type="image/x-icon"
    />

    <!-- Meta Tags for SEO -->
    <meta
      name="description"
      content="Gabriel Aldea - Web Developer Portfolio. Showcasing my work in web development, design, and modern solutions."
    />
    <meta name="author" content="Gabriel Aldea" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Meta Tags (for social sharing) -->
    <meta property="og:site_name" content="Gabriel Aldea Portfolio" />
    <meta
      property="og:title"
      content="Gabriel Aldea - Web Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Explore my portfolio and web development projects that showcase my skills in creating modern and responsive websites."
    />
    <!-- WhatsApp and general social sharing image -->
    <meta
      property="og:image"
      content="https://gabrielaldea.netlify.app/social-media.png"
    />
    <meta property="og:url" content="https://gabrielaldea.netlify.app/" />
    <meta property="og:type" content="website" />

    <!-- WhatsApp specific meta tags -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Gabriel Aldea's Portfolio Preview" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Gabriel Aldea - Web Developer Portfolio"
    />
    <meta
      name="twitter:description"
      content="Explore my portfolio and web development projects that showcase my skills in creating modern and responsive websites."
    />
    <meta
      name="twitter:image"
      content="https://gabrielaldea.netlify.app/social-media.png"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Modern web fonts (Google Fonts) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
    />
  </head>
  <body style="font-family: 'Roboto', sans-serif">
    <!-- Main Root Element for React -->
    <div id="root"></div>

    <!-- Scripts -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
